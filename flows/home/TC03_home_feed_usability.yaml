appId: any
name: "TC03 - Home Feed Usability"
tags:
  - home
  - regression
---
- runFlow: ../../helpers/complete_onboarding.yaml

# Set up location to get Kenya content cards (precondition for the feed test)
- runFlow: ../../helpers/grant_location.yaml

# Scroll down to find "Related questions" section
- scrollUntilVisible:
    centerElement: true
    element:
      text: "Related questions"
    direction: DOWN
    timeout: 90000
    speed: 40
- assertVisible: "Related questions"
# Go back to home screen
- back

- extendedWaitUntil:
    visible:
      id: "home_screen"
    timeout: 10000
- tapOn:
    text: "Learn More"
    index: 0
- extendedWaitUntil:
    visible:
      id: "chat_read_full_advice_button"
    timeout: 30000
- scrollUntilVisible:
    centerElement: true
    element:
      id: "chat_read_full_advice_button"
    direction: DOWN
- tapOn:
    id: "chat_read_full_advice_button"
- extendedWaitUntil:
    visible:
      id: "chat_thread_list"
    timeout: 30000
- scrollUntilVisible:
    centerElement: true
    element:
      text: "Related questions"
    direction: DOWN
    timeout: 90000
- assertVisible: "Related questions"
