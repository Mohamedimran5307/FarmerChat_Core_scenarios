appId: any
name: "TC02 - AI Chat Experience"
tags:
  - home
  - chat
  - regression
---
- runFlow: ../../helpers/complete_onboarding.yaml

# Tap on Type button
- tapOn:
    id: "home_type_button"
- tapOn: "Ask about your farm..."
- inputText: "How to grow tomatoes in Kenya"
- extendedWaitUntil:
    visible:
      id: "text_input_send_button"
    timeout: 5000
- tapOn:
    id: "text_input_send_button"

- extendedWaitUntil:
    visible:
      id: "chat_thread_list"
    timeout: 30000
- waitForAnimationToEnd

# Scroll down to find "Related questions" section first
- scrollUntilVisible:
    centerElement: true
    element:
      text: "Related questions"
    direction: DOWN
    timeout: 90000
    speed: 40
- assertVisible: "Related questions"

# Now scroll a bit more to make the "Ask" button visible and clickable
- scroll:
    direction: DOWN
    duration: 500

# Exact "^Ask$" avoids matching the composer hint "Ask about your farm..."
- extendedWaitUntil:
    visible:
      text: "^Ask$"
    timeout: 10000
- tapOn:
    text: "^Ask$"

- extendedWaitUntil:
    visible:
      id: "chat_thread_list"
    timeout: 30000
- waitForAnimationToEnd
