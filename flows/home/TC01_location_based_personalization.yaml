appId: any
name: "TC01 - Location-Based Personalization"
tags:
  - home
  - regression
---
- runFlow: ../../helpers/complete_onboarding.yaml

- runFlow: ../../helpers/grant_location.yaml

# Scroll down to find "Related questions" section
- scrollUntilVisible:
    centerElement: true
    element:
      text: "Related questions"
    direction: DOWN
    timeout: 90000
    speed: 40
- assertVisible: "Related questions"

# Go back to home screen using back button
- back

- extendedWaitUntil:
    visible:
      id: "home_screen"
    timeout: 10000

# - scrollUntilVisible:
#     element:
#       text: "Learn More"
#     direction: DOWN
#     timeout: 15000
- assertVisible: "Learn More"
