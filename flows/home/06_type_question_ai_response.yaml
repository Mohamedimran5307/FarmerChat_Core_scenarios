appId: any
name: "TC06 - Type Question, Get AI Response, Tap Related Question"
tags:
  - home
  - chat
  - regression
---
- runFlow: ../../helpers/complete_onboarding.yaml

# Tap on Type button
- tapOn:
    id: "home_type_button"
- tapOn: "Ask about your farm..."
- inputText: "How to grow tomatoes in Kenya"
- extendedWaitUntil:
    visible:
      id: "text_input_send_button"
    timeout: 5000
- tapOn:
    id: "text_input_send_button"

- extendedWaitUntil:
    visible:
      id: "chat_thread_list"
    timeout: 30000
- scrollUntilVisible:
    element:
      text: "Related questions"
    direction: DOWN
    timeout: 90000
- assertVisible: "Related questions"

- scrollUntilVisible:
    element:
      text: "Ask"
    direction: DOWN
    timeout: 15000
- tapOn: "Ask"

- extendedWaitUntil:
    visible:
      id: "chat_thread_list"
    timeout: 30000
- scrollUntilVisible:
    element:
      text: "Related questions"
    direction: DOWN
    timeout: 90000
- assertVisible: "Related questions"
